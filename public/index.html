<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ПЛ №3 | Система Управления</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --sidebar-bg: #0f172a;
        --accent: #4f46e5;
      }
      body {
        background: #f1f5f9;
        font-family: "Inter", sans-serif;
        display: flex;
        min-height: 100vh;
        margin: 0;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        color: white;
        position: fixed;
        height: 100vh;
        padding: 25px;
        z-index: 1000;
      }
      .nav-btn {
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        color: #94a3b8;
        padding: 12px 15px;
        border-radius: 10px;
        margin-bottom: 8px;
        font-weight: 600;
        transition: 0.3s;
      }
      .nav-btn:hover {
        background: #1e293b;
        color: white;
      }
      .nav-btn.active {
        background: var(--accent);
        color: white;
      }

      /* Main Content */
      .main-content {
        margin-left: 280px;
        width: calc(100% - 280px);
        padding: 40px;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }

      .card-st {
        background: white;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
      }

      /* Attendance Journal */
      .table-journal th,
      .table-journal td {
        padding: 5px;
        font-size: 11px;
        border: 1px solid #dee2e6;
        width: 28px;
        height: 28px;
        text-align: center;
      }
      .present {
        background-color: #22c55e !important;
        color: white;
      }
      .absent {
        background-color: #f8fafc;
        color: #cbd5e1;
      }
      .fio-col {
        text-align: left !important;
        width: 220px !important;
        font-size: 13px !important;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="text-center mb-5">
        <h4 class="fw-bold text-white m-0">ПРОФЛИЦЕЙ №3</h4>
        <span class="text-info small">Учебная часть</span>
      </div>

      <button class="nav-btn active" onclick="showSection('search', this)">
        🔍 Реестр и Справки
      </button>
      <button class="nav-btn" onclick="showSection('groups-man', this)">
        📂 Списки групп
      </button>
      <button class="nav-btn" onclick="showSection('journal', this)">
        📅 Журнал СКУД
      </button>
      <button class="nav-btn" onclick="showSection('food', this)">
        🍱 Ведомость питания
      </button>
      <button class="nav-btn" onclick="showSection('import', this)">
        📥 Импорт данных
      </button>
    </div>

    <div class="main-content">
      <div id="section-search" class="section active">
        <h2 class="fw-bold mb-4">Поиск студентов</h2>
        <input
          type="text"
          id="searchInput"
          class="form-control form-control-lg mb-4 shadow-sm"
          placeholder="Введите фамилию..."
          oninput="doSearch()"
        />
        <div id="results" class="row"></div>
      </div>

      <div id="section-groups-man" class="section">
        <h2 class="fw-bold mb-4">Управление студентами по группам</h2>
        <div class="row">
          <div class="col-md-3">
            <div class="card-st">
              <h6 class="fw-bold mb-3">Группы:</h6>
              <div
                id="groups-list-container"
                class="list-group list-group-flush"
              ></div>
            </div>
          </div>
          <div class="col-md-9">
            <div id="group-details-card" class="card-st d-none">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <h4 class="fw-bold m-0" id="current-group-title"></h4>
                <div class="btn-group">
                  <button
                    class="btn btn-sm btn-outline-danger"
                    onclick="clearStudents()"
                  >
                    🧹 Очистить список
                  </button>
                  <button class="btn btn-sm btn-danger" onclick="deleteGroup()">
                    🗑️ Удалить группу
                  </button>
                </div>
              </div>
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ФИО</th>
                    <th>Дата рождение</th>
                    <th>ИНН</th>
                    <th>Поименный №</th>
                    <th class="text-end">Правка</th>
                  </tr>
                </thead>
                <tbody id="group-students-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="section-journal" class="section">
        <h2 class="fw-bold mb-4">Журнал посещаемости</h2>
        <div class="card-st mb-4">
          <div class="row g-3">
            <div class="col-md-4">
              <select id="j-group-select" class="form-select"></select>
            </div>
            <div class="col-md-3">
              <input
                type="month"
                id="j-month"
                class="form-control"
                value="2026-02"
              />
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary w-100" onclick="loadJournal()">
                Показать
              </button>
            </div>
          </div>
        </div>
        <div class="card-st table-responsive p-0">
          <table class="table table-journal mb-0">
            <thead class="table-dark" id="journal-head"></thead>
            <tbody id="journal-body"></tbody>
          </table>
        </div>
      </div>

      <div id="section-food" class="section">
        <h2 class="fw-bold mb-4">Ведомость на питание (60 сом)</h2>
        <div class="card-st" style="max-width: 500px">
          <label class="small fw-bold mb-1">Группа</label>
          <select id="f-group-select" class="form-select mb-3"></select>
          <label class="small fw-bold mb-1">Месяц</label>
          <input
            type="month"
            id="f-month"
            class="form-control mb-4"
            value="2026-02"
          />
          <button
            class="btn btn-success w-100 py-3 fw-bold"
            onclick="downloadFoodReport()"
          >
            📥 СКАЧАТЬ DOCX
          </button>
        </div>
      </div>

      <div id="section-import" class="section">
        <h2 class="fw-bold mb-4">Импорт Excel</h2>
        <div class="card-st" style="max-width: 550px">
          <input
            type="text"
            id="import-gname"
            class="form-control mb-3"
            placeholder="Название группы (ЭВМ-1-24)"
          />
          <select
            id="import-prof-select"
            class="form-select mb-3"
            onchange="updateDurationHint()"
          ></select>
          <div
            id="duration-info"
            class="alert alert-info py-2 fw-bold d-none mb-4"
          ></div>
          <input type="file" id="import-file" class="form-control mb-4" />
          <button
            class="btn btn-primary w-100 py-2 fw-bold"
            onclick="processImport()"
          >
            🚀 ЗАГРУЗИТЬ ГРУППУ
          </button>
        </div>
      </div>
    </div>

    <script>
      let activeGroupId = null;
      let professions = [];

      function showSection(id, btn) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById("section-" + id).classList.add("active");
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        if (id === "groups-man") loadGroupsMan();
        if (id === "journal" || id === "food") loadGroupsList();
        if (id === "import") loadProfessions();
      }

      // --- УПРАВЛЕНИЕ ГРУППАМИ ---
      async function loadGroupsMan() {
        const res = await fetch("/api/admin/groups-list");
        const groups = await res.json();
        document.getElementById("groups-list-container").innerHTML = groups
          .map(
            (g) => `
            <button class="list-group-item list-group-item-action" onclick="viewGroup('${g._id}', '${g.name}')">🏢 ${g.name}</button>
        `,
          )
          .join("");
      }

      async function viewGroup(id, name) {
        activeGroupId = id;
        document
          .getElementById("group-details-card")
          .classList.remove("d-none");
        document.getElementById("current-group-title").innerText = name;

        const res = await fetch(`/api/admin/group-students/${id}`);
        const students = await res.json();

        document.getElementById("group-students-body").innerHTML = students
          .map(
            (s) => `
        <tr>
            <td class="fw-bold">${s.fio}</td>
            <td>${s.birthDate}</td>
            <td><code>${s.inn || "—"}</code></td> <td><span class="badge bg-secondary">${s.lyceumId}</span></td>
            <td class="text-end">
                <button class="btn btn-sm btn-light" onclick="editStudent('${s._id}','${s.fio}','${s.birthDate}','${s.inn}','${s.lyceumId}')">✏️</button>
            </td>
        </tr>
    `,
          )
          .join("");
      }

      async function deleteGroup() {
        if (!activeGroupId) return;
        if (confirm("УДАЛИТЬ ГРУППУ И ВСЕХ СТУДЕНТОВ?")) {
          await fetch(`/api/admin/group/${activeGroupId}`, {
            method: "DELETE",
          });
          loadGroupsMan();
          document.getElementById("group-details-card").classList.add("d-none");
        }
      }

      async function clearStudents() {
        if (!activeGroupId) return;
        if (confirm("Удалить всех студентов из группы? Группа останется.")) {
          await fetch(`/api/admin/group/${activeGroupId}/clear`, {
            method: "DELETE",
          });
          viewGroup(
            activeGroupId,
            document.getElementById("current-group-title").innerText,
          );
        }
      }

      // --- ИМПОРТ ---
      async function loadProfessions() {
        const res = await fetch("/api/admin/professions");
        professions = await res.json();
        document.getElementById("import-prof-select").innerHTML =
          '<option value="" disabled selected>-- Выберите профессию --</option>' +
          professions
            .map((p) => `<option value="${p.id}">${p.ru}</option>`)
            .join("");
      }

      function updateDurationHint() {
        const pId = document.getElementById("import-prof-select").value;
        const prof = professions.find((p) => p.id == pId);
        const info = document.getElementById("duration-info");
        if (prof) {
          info.innerText = "⏳ Срок обучения: " + prof.duration;
          info.classList.remove("d-none");
        }
      }

      async function processImport() {
        const fd = new FormData();
        fd.append("file", document.getElementById("import-file").files[0]);
        fd.append("groupName", document.getElementById("import-gname").value);
        fd.append(
          "profId",
          document.getElementById("import-prof-select").value,
        );
        const res = await fetch("/api/admin/import", {
          method: "POST",
          body: fd,
        });
        if (res.ok) {
          alert("Успешно!");
          location.reload();
        }
      }

      // --- ЖУРНАЛ И ПИТАНИЕ ---
      async function loadGroupsList() {
        const res = await fetch("/api/admin/groups-list");
        const groups = await res.json();
        const opts = groups
          .map((g) => `<option value="${g._id}">${g.name}</option>`)
          .join("");
        document.getElementById("j-group-select").innerHTML = opts;
        document.getElementById("f-group-select").innerHTML = opts;
      }

      async function loadJournal() {
        const gid = document.getElementById("j-group-select").value;
        const month = document.getElementById("j-month").value;
        const res = await fetch(`/api/admin/attendance-matrix/${gid}/${month}`);
        const data = await res.json();
        let h = `<tr><th class="fio-col">ФИО</th>`;
        for (let i = 1; i <= data.daysInMonth; i++) h += `<th>${i}</th>`;
        document.getElementById("journal-head").innerHTML = h + `</tr>`;
        document.getElementById("journal-body").innerHTML = data.matrix
          .map(
            (r) => `
            <tr><td class="fio-col">${r.fio}</td>${r.days.map((d) => `<td class="${d.present ? "present" : "absent"}">${d.present ? "●" : ""}</td>`).join("")}</tr>
        `,
          )
          .join("");
      }

      function downloadFoodReport() {
        const gid = document.getElementById("f-group-select").value;
        const month = document.getElementById("f-month").value;
        window.open(`/api/admin/report-food/${gid}/${month}`);
      }

      // --- ПОИСК ---
      async function doSearch() {
        const q = document.getElementById("searchInput").value;
        const res = await fetch("/api/admin/search?q=" + q);
        const data = await res.json();
        document.getElementById("results").innerHTML = data
          .map(
            (s) => `
            <div class="col-md-6 mb-3">
                <div class="card p-3 shadow-sm border-start border-4 border-primary">
                    <div class="fw-bold">${s.fio}</div>
                    <div class="small text-muted mb-3">${s.group ? s.group.name : "—"}</div>
                    <div class="btn-group w-100">
                        <button class="btn btn-sm btn-outline-dark" onclick="window.open('/api/admin/print/${s._id}/common')">Обычная</button>
                        <button class="btn btn-sm btn-outline-primary" onclick="window.open('/api/admin/print/${s._id}/army')">Военкомат</button>
                        <button class="btn btn-sm btn-outline-success" onclick="window.open('/api/admin/print/${s._id}/social')">Соцфонд</button>
                    </div>
                </div>
            </div>
        `,
          )
          .join("");
      }

      async function editStudent(id, f, b, i, l) {
        const nF = prompt("ФИО:", f);
        const nB = prompt("Дата рождение:", b);
        const nI = prompt("ИНН:", i);
        const nL = prompt("Поименный номер:", l);
        if (nF) {
          await fetch(`/api/admin/student/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              fio: nF,
              birthDate: nB,
              inn: nI,
              lyceumId: nL,
            }),
          });
          viewGroup(
            activeGroupId,
            document.getElementById("current-group-title").innerText,
          );
        }
      }

      window.onload = doSearch;
    </script>
  </body>
</html>
